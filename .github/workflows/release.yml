# release — tag-triggered binary release.
#
# On push of a tag matching `v*` (e.g. v1.0.0), GoReleaser builds and publishes
# static binaries for linux/amd64, linux/arm64, darwin/amd64, darwin/arm64 to the
# GitHub Release. CGO is disabled so all four targets are pure static builds.
# Version metadata is injected via -ldflags (see .goreleaser.yml).

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is needed for GoReleaser changelog generation.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Defense-in-depth publication gate: re-run the committed DEFER
      # disposition manifest evaluator against the tagged commit and refuse
      # publication on any refusal. The tag has already been pushed by the
      # time this step runs, so CI cannot un-create the tag — it can only
      # refuse to publish artifacts (binary release, changelog) until the
      # tagged state is corrected.
      #
      # Pre-tag authority remains scripts/release-tag.sh (the wrapper runs
      # the same evaluator before any `git tag`). This CI step is the
      # bypass-detection + publication-protection layer; it is NOT the
      # primary release authority.
      #
      # Failure modes that refuse publication (evaluator exits nonzero):
      #   - missing or unsupported manifest at the tagged commit
      #   - freshness-handshake mismatch (evaluated_commit / evaluated_tree /
      #     manifest_parent_commit vs HEAD^ / tree(HEAD^))
      #   - HEAD^..HEAD diff contains anything other than the manifest path
      #   - wrong release_base (tag mismatch with the reachable-tag lookup
      #     `git tag --merged HEAD --sort=-v:refname`, excluding the
      #     under-evaluation version supplied via --release-version)
      #   - schema/staleness/malformed-record errors
      #   - any record classified as a blocker
      #   - unsatisfied override_required record
      #
      # Disclosures and accepted overrides are emitted in the evaluator's
      # JSON stdout and appear in the run log for the release audit trail.
      - name: Re-release DEFER manifest recompute
        run: |
          set -euo pipefail
          mkdir -p tmp
          node .opencode/scripts/check-defer-triggers.js \
            --mode=release \
            --release-version "${GITHUB_REF_NAME}" \
            | tee tmp/release-defer-evaluator.json
          # Surface disclosures + accepted overrides as a visible summary so
          # they are not buried inside the full JSON envelope on the log.
          node -e '
            const fs = require("fs");
            const env = JSON.parse(fs.readFileSync("tmp/release-defer-evaluator.json", "utf8"));
            const lines = [];
            if (Array.isArray(env.disclosures) && env.disclosures.length) {
              lines.push("disclosures:");
              for (const d of env.disclosures) lines.push("  - " + JSON.stringify(d));
            }
            if (Array.isArray(env.accepted_overrides) && env.accepted_overrides.length) {
              lines.push("accepted_overrides:");
              for (const o of env.accepted_overrides) lines.push("  - " + JSON.stringify(o));
            }
            if (lines.length) console.log(lines.join("\n"));
          '

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
